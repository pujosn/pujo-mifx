version: '3.8'

services:
  # 1. Service Web Server (PHP-Nginx)
  webserver:
    image: pujosn/assignment-mifx:latest
    container_name: php_nginx_container
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    restart: always
    depends_on:
      - postgres_db

  # 2. Service Database (PostgreSQL 16)
  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_sre
    command: postgres -c max_connections=200 #menaikan max connections menjadi 200 "database: increase postgres max_connections to 200"
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_RO_PASSWORD: ${POSTGRES_READONLY_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    restart: always


volumes:
  pgdata: