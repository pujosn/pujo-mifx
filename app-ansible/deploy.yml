---
- name: Deploy and Force Update Docker Compose Application
  hosts: target_server
  become: false 
  
  vars:
    app_dir: "{{ ansible_env.HOME }}/app-deployed"

  tasks:
    - name: Ensure application directory exists on target server
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy project files to target server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app-php/" 
        dest: "{{ app_dir }}/"
        mode: '0755'

    - name: Pull latest Docker images from registry
      ansible.builtin.command:
        cmd: docker compose pull   
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Stop and remove existing containers safely
      ansible.builtin.command:
        cmd: docker compose down
        chdir: "{{ app_dir }}"
      failed_when: false 

    - name: Force update and recreate Docker Compose containers via standard Docker CLI
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Verify that the web application is running properly
      ansible.builtin.uri:
        url: http://localhost:8080
        status_code: 200
      register: web_check
      retries: 3
      delay: 5
      until: web_check.status == 200