---
- name: Deploy and Force Update Docker Compose Application
  hosts: target_server
  become: false 
  
  vars:
    app_dir: "{{ ansible_env.HOME }}/app-deployed"

  tasks:
    - name: Ensure application directory exists on target server
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy project files to target server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app-php/" 
        dest: "{{ app_dir }}/"
        mode: '0755'

    # 🛠️ [DIPERBAIKI]: Membaca variabel langsung dari extra-vars (-e) github actions
    - name: Log in to Docker Hub via Ansible
      ansible.builtin.command:
        cmd: "docker login -u {{ docker_user }} -p {{ docker_pass }}"
      no_log: true 

    - name: Pull latest Docker images from registry
      ansible.builtin.command:
        cmd: docker compose pull   
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Stop and remove existing containers safely
      ansible.builtin.command:
        cmd: docker compose down
        chdir: "{{ app_dir }}"
      failed_when: false 

    - name: Force update and recreate Docker Compose containers via standard Docker CLI
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      changed_when: true